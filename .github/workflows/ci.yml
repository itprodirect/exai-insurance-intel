name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ipykernel

      - name: Run ruff
        run: |
          python -m ruff check .

      - name: Run pytest
        run: |
          python -m pytest -q

      - name: Register kernel
        run: |
          python -m ipykernel install --user --name python3

      - name: Run no-network smoke execution
        env:
          EXA_SMOKE_NO_NETWORK: "1"
        run: |
          python scripts/run_notebook_smoke.py --mode smoke

      - name: Run bounded smoke validation
        run: |
          python scripts/run_live_validation.py --mode smoke --run-id-prefix ci-smoke

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --strict --desc --skip-editable

      - name: SAST scan (bandit)
        run: |
          pip install bandit
          bandit -r src/ -c pyproject.toml

      - name: Secret scan (detect-secrets)
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --baseline .secrets.baseline --exclude-files '\.ipynb$' --exclude-files 'experiments/'
          detect-secrets audit --report .secrets.baseline
